session_77:
  date: 2026-06-18
  trigger: 用户报告OOM死机
  oom_incident:
    rounds: 3
    timeline:
    - '01:40-01:46: 可用内存降至667MB, watchdog杀3个crush + 内核OOM kill python3(RSS 29.8GB)'
    - '05:00-05:11: 可用内存降至651MB, watchdog杀6个crush + 重启2容器'
    - '06:12-06:22: 可用内存降至455MB, watchdog杀3个crush + 重启3容器, load=174'
    root_cause_analysis:
      lingflow_plus_proxy_storm: 旧Python proxy service和switchover抢:8765, bind失败每10秒重启,
        累计22079次
      python3_27gb: session-14113.scope(灵克pts/3会话), crush→lingxi→python3子进程链, 42GB
        VM/29.8GB RSS纯堆, 身份未100%确认
      lingflow_attribution_correct: restart storm确实存在且必须停掉 ✅
      lingflow_attribution_wrong: restart storm不是27.8GB元凶(进程bind失败几百ms退出不会膨胀; cgroup不匹配system.slice
        vs session.scope) ❌
    recovery_actions:
    - 停用lingflow-plus-proxy/guardian/standalone三个service(systemctl被灵犀安全规则禁, 用户手动执行)
    - Docker重启修复iptables(sudo systemctl restart docker)
    - 灵知Docker网络重建(docker compose down + network prune + up -d)
    - 灵康确认一直在运行(pid 506080, 无需恢复)
    remaining_issues:
    - 27.8GB python3真实身份未确认(P1)
    - zhineng-prometheus因:9090端口冲突未启动
    - swap仍占4G(load高时不宜swapoff)
    lessons:
    - watchdog四级响应(OK/WARNING/CRITICAL/EMERGENCY)成功防止了真死机
    - restart storm的bind失败进程不会膨胀但会持续fork增加内存压力
    - Docker重启后网络sandbox可能损坏, 需network prune+compose重建
    - systemctl被灵犀安全规则禁, 红区操作需用户手动执行
