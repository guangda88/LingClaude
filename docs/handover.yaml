task:
  goal: 建设灵忆(lingmemory)会话管理基础设施
  why: ZAI配额根因暴露会话内信息无管理 + 12成员handover格式不统一 + 会话产出无法结构化检索
  success_conditions:
    - 一个任务的完整生命周期可被结构化记录和检索
    - 至少3个成员用同一套格式，无需自定义
    - 过程信息不再堆积导致上下文膨胀
    - 新会话读结构化记录即可恢复任务，不依赖人脑
  long_term_directions:
    - 可复用: 灵族内部12成员+对外项目→长期外部工具化
    - 基础设施: 结构化会话存储与检索（存/查/链）
  dependencies: 基础设施（结构化存储）是可复用的前提，不可跳过
  related_tasks:
    - id: lingbus-schema-coordination
      name: LingBus共享schema协调（灵信）
      owner: lingmessage
      status: 灵信已反馈方案
      relationship: 共享schema定义（members/signatures/governance用视图或共享表）
      note: 灵信判断LingBus不需要重写（631测试全过/18MB/WAL<1ms），灵忆独立推进存储层，不依赖LingBus重建

