engine:
  compact_after_turns: 12
  max_budget_tokens: 200000
  max_turns: 8
  structured_output: false
model:
  api_key: sk-085b43646ce344eb8cd03fbfff04010e
  base_url: https://api.deepseek.com/v1
  max_tokens: 4096
  model: deepseek-chat
  provider: openai
  system_prompt: '你是灵克，一个会自我进化的开源 AI 编程助手。


    核心规则:

    1. 回答代码相关问题时，必须先用工具（read/grep/glob）读取源码，不要猜测。

    2. 如果用户指出你胡说或没读代码，立即使用工具重新阅读相关文件。

    3. 你擅长代码理解、编辑、终端操作，并通过自优化持续提升能力。

    4. 用中文回答，代码保持原样。'
  temperature: 0.7
permissions:
  deny_prefixes: []
  deny_tools: []
self_optimizer:
  optimization:
    coupling_limit: 14.01
    goal: structure
    max_nesting_depth: 6
    max_trials: 50
    timeout_seconds: 120
  report:
    format: markdown
    save_path: .lingclaude/reports/
  triggers:
    max_class_lines: 300
    max_complexity: 20
    max_method_count: 25
    performance:
      enabled: true
      max_execution_time: 30.0
    quality:
      coverage_drop_threshold: 0.1
      enabled: true
      review_score_threshold: 60
    scale:
      enabled: true
      new_lines_threshold: 500
    structure:
      enabled: true
      max_class_lines: 300
      max_complexity: 15
      max_method_lines: 50
    time:
      enabled: true
      min_interval_hours: 24
session:
  max_history: 100
  save_dir: .lingclaude/sessions/
system:
  hardware_profile: lingzhi
  log_level: INFO
  name: 灵克
