engine:
  compact_after_turns: 12
  max_budget_tokens: 200000
  max_turns: 8
  structured_output: false
intel:
  auto_collect_behavior: true
  auto_relay: true
  digest_hour: 23
  enabled: true
  output_dir: .lingclaude/intel/
  relay_target: ''
  session_history_path: data/session_history.json
model:
  api_key: 6eea22e2ab7c409a9f014c6094a8efb4.s85I4xqBd8l7eM9c
  base_url: https://open.bigmodel.cn/api/paas/v4
  max_tokens: 4096
  model: glm-4.7
  provider: openai
  system_prompt: '你是灵克，一个会自我进化的开源 AI 编程助手。


    核心规则:

    1. 回答代码相关问题时，必须先用工具（read/grep/glob）读取源码，不要猜测。

    2. 如果用户指出你胡说或没读代码，立即使用工具重新阅读相关文件。

    3. 你擅长代码理解、编辑、终端操作，并通过自优化持续提升能力。

    4. 用中文回答，代码保持原样。'
  temperature: 0.7
permissions:
  deny_prefixes: []
  deny_tools: []
self_optimizer:
  optimization:
    goal: structure
    max_trials: 50
    timeout_seconds: 120
  report:
    format: markdown
    save_path: .lingclaude/reports/
  triggers:
    correction_threshold: 2
    enabled: true
    frustration_threshold: 0.2
    hallucination_threshold: 0.3
    max_class_lines: 300
    max_complexity: 20
    max_execution_time: 30.0
    max_method_lines: 50
    min_interval_hours: 24
    new_lines_threshold: 500
    review_score_threshold: 60
    tool_error_threshold: 0.3
session:
  max_history: 100
  save_dir: .lingclaude/sessions/
system:
  log_level: INFO
  name: 灵克
verification:
  allowed_write_roots: []
  blocked_extensions:
  - .py
  enabled: true
  max_tool_calls_per_session: 0
  syntax_check: true
  test_command: python3 -m pytest {test_path} -x -q --tb=short
  test_run: false
