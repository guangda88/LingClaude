# EXP-2: Evolution Mechanism Isolation
# 实验ID：EXP-002
# 实验目标：隔离并验证AI自我进化的核心机制

experiment:
  id: "EXP-002"
  name: "进化机制隔离实验"
  version: "1.0"
  start_date: "2026-04-10"
  researcher: "LingClaude (灵克)"
  reviewer: "LingYang (灵妍)"
  research_question: "RQ2: AI自我进化的核心机制是什么？"

# 实验假设
hypotheses:
  H2a:
    statement: "工具驱动的认知锚定是核心机制"
    target: "显著提升"
    metric: "cognitive_anchoring_score"
  H2b:
    statement: "反馈循环是进化的驱动力"
    target: "正相关"
    metric: "feedback_loop_strength"
  H2c:
    statement: "策略传递实现跨会话进化"
    target: "有效传递"
    metric: "strategy_transfer_rate"

# 实验组别
groups:
  no_tool:
    id: "D"
    name: "无工具锚定组"
    description: "禁用工具，纯自然语言交互"
    recipe_enabled: false
    tool_anchoring_enabled: false
    feedback_enabled: true
    strategy_sharing_enabled: false
    time_limit_hours: 3.0
    expected_effectiveness: 0.40
    expected_efficiency: 1.0
    sample_size: 1  # Phase 1

  tool_anchored:
    id: "E"
    name: "工具锚定组"
    description: "启用工具锚定和完整反馈循环"
    recipe_enabled: true
    recipe_level: "enhanced"
    tool_anchoring_enabled: true
    feedback_enabled: true
    strategy_sharing_enabled: false
    time_limit_hours: 3.0
    expected_effectiveness: 0.92
    expected_efficiency: 15.0
    sample_size: 1  # Phase 1

  full_evolution:
    id: "F"
    name: "完整进化组"
    description: "工具锚定 + 反馈循环 + 策略传递"
    recipe_enabled: true
    recipe_level: "enhanced"
    tool_anchoring_enabled: true
    feedback_enabled: true
    strategy_sharing_enabled: true
    time_limit_hours: 3.0
    expected_effectiveness: 0.96
    expected_efficiency: 30.0
    sample_size: 1  # Phase 1

# 机制配置
mechanisms:
  tool_anchoring:
    enabled: true  # 组D关闭
    description: "工具驱动的认知锚定"
    implementation:
      - "工具优先于推测"
      - "精确匹配优先"
      - "工具调用前验证"
    measurement:
      metric: "tool_usage_ratio"
      formula: "tool_calls / total_operations"
      target: 0.80

  feedback_loop:
    enabled: true  # D、E、F都启用
    description: "反馈循环"
    implementation:
      - "工具结果反馈"
      - "错误诊断反馈"
      - "效率监控反馈"
    measurement:
      metric: "feedback_loop_strength"
      formula: "feedback_actions / total_actions"
      target: 0.70

  strategy_sharing:
    enabled: false  # D、E关闭，F启用
    description: "策略传递"
    implementation:
      - "策略提取"
      - "策略共享"
      - "策略复用"
    measurement:
      metric: "strategy_transfer_rate"
      formula: "transferred_strategies / total_strategies"
      target: 0.50

# 配方定义（仅E、F组使用）
recipes:
  enhanced:
    rules:
      - name: "tool_anchoring"
        description: "优先使用工具，避免推测"
        enforcement: "strict"
      - name: "read_before_edit"
        description: "修改前必须先阅读文件"
        enforcement: "strict"
      - name: "test_after_edit"
        description: "修改后必须测试"
        enforcement: "strict"
      - name: "diagnose_before_retry"
        description: "重试前先诊断失败原因"
        enforcement: "strict"
      - name: "extract_strategies"
        description: "提取有效策略"
        enforcement: "recommended"
      - name: "monitor_efficiency"
        description: "监控效率指标"
        enforcement: "optional"
    max_attempts: 5
    diagnostic_level: "systematic"
    retry_strategy: "exponential_backoff"

# 任务配置
task:
  id: "TASK-002"
  name: "诊断与修复模块"
  description: "诊断并修复代码库中的多个问题，需要多轮迭代"
  difficulty: "medium"
  category: "diagnostic"

  # 子任务
  subtasks:
    - id: "ST-001"
      name: "诊断代码库"
      description: "分析代码库，识别潜在问题"
      expected_time_hours: 1.0
      dependencies: []

    - id: "ST-002"
      name: "修复问题1"
      description: "修复发现的第一个问题"
      expected_time_hours: 0.5
      dependencies: ["ST-001"]

    - id: "ST-003"
      name: "修复问题2"
      description: "修复发现的第二个问题"
      expected_time_hours: 0.5
      dependencies: ["ST-001"]

    - id: "ST-004"
      name: "验证修复"
      description: "验证所有修复是否有效"
      expected_time_hours: 1.0
      dependencies: ["ST-002", "ST-003"]

  # 人类预期时间
  expected_human_time_months: 2.0
  expected_human_time_hours: 320.0  # 2个月 * 20天 * 8小时

  # AI预期时间
  expected_ai_time_hours: 3.0

  # 工具集
  toolset: "standard"

# 测量指标
metrics:
  # 核心指标
  core:
    operation_effectiveness:
      formula: "successes / attempts"
      unit: "ratio"
      target: 0.90
      critical: true
      target_by_group:
        D: 0.40
        E: 0.92
        F: 0.96

    efficiency_gain:
      formula: "expected_human_time / actual_ai_time"
      unit: "x"
      target: 10.0
      critical: true
      target_by_group:
        D: 1.0
        E: 15.0
        F: 30.0

    cognitive_stability:
      formula: "1 - variance(repeated_operations)"
      unit: "ratio"
      target: 0.95
      critical: true
      target_by_group:
        D: 0.40
        E: 0.92
        F: 0.97

    tool_usage_ratio:
      formula: "tool_calls / total_operations"
      unit: "ratio"
      target: 0.80
      critical: true
      target_by_group:
        D: 0.00
        E: 0.85
        F: 0.85

    feedback_loop_strength:
      formula: "feedback_actions / total_actions"
      unit: "ratio"
      target: 0.70
      critical: true
      target_by_group:
        D: 0.30
        E: 0.75
        F: 0.75

    strategy_transfer_rate:
      formula: "transferred_strategies / total_strategies"
      unit: "ratio"
      target: 0.50
      critical: true
      target_by_group:
        D: 0.00
        E: 0.00
        F: 0.60

  # 机制特定指标
  mechanism:
    cognitive_anchoring_score:
      description: "认知锚定强度"
      formula: "tool_success_rate * tool_usage_ratio"
      unit: "ratio"
      target: 0.70

    evolution_speed:
      description: "进化速度（达到90%有效性的时间）"
      formula: "time_to_90_percent"
      unit: "hours"
      target: 2.5
      target_by_group:
        D: 3.0  # 可能达不到90%
        E: 2.0
        F: 1.5

    entropy_reduction:
      description: "认知熵减少（初始 - 最终）"
      formula: "initial_entropy - final_entropy"
      unit: "bits"
      target: 2.0

  # 辅助指标
  auxiliary:
    operation_trace:
      type: "log"
      description: "操作轨迹日志"

    decision_trace:
      type: "log"
      description: "决策轨迹日志"

    feedback_trace:
      type: "log"
      description: "反馈轨迹日志"

    tool_usage_pattern:
      type: "sequence"
      description: "工具使用模式"

# 监控配置
monitoring:
  enabled: true

  # 采样配置
  sampling:
    sample_interval: 180  # 3分钟（更频繁，因为时间短）
    check_points: [0.5, 1.0, 1.5, 2.0, 2.5, 3.0]  # 小时

  # 实时监控指标
  realtime_metrics:
    - operation_effectiveness
    - efficiency_gain
    - tool_usage_ratio
    - feedback_loop_strength
    - success_rate

  # 日志配置
  logging:
    level: "DEBUG"
    format: "jsonl"
    file: "experiments/data/EXP-002_{group_id}_run{run_id}.jsonl"

  # 可视化配置
  visualization:
    enabled: true
    realtime_plots: false
    final_plots: true
    plot_types:
      - "line"  # 进化曲线
      - "bar"   # 组间对比
      - "scatter"  # 工具使用 vs 有效性
      - "heatmap"  # 机制激活热力图

# 数据输出配置
output:
  data_dir: "experiments/data/EXP-002"
  report_dir: "experiments/reports/EXP-002"
  plot_dir: "experiments/plots/EXP-002"

  # 报告格式
  report_formats:
    - "markdown"
    - "json"

# 统计检验配置
statistics:
  enabled: true
  alpha: 0.05
  tests:
    - "t_test"           # t检验（组间比较）
    - "anova"            # 方差分析（三组比较）
  effect_size:
    - "cohens_d"         # Cohen's d

# 验证标准
validation:
  # 最小操作数
  min_operations: 30

  # 数据质量检查
  data_quality:
    - "no_missing_values"
    - "consistent_timestamps"
    - "valid_metric_ranges"

  # 结果可信度
  confidence_level: 0.95

# 风险缓解
risk_mitigation:
  # 超时处理
  timeout_handling:
    enabled: true
    grace_period: 180  # 3分钟
    checkpoint_interval: 300  # 5分钟

  # 重试机制
  retry:
    enabled: true
    max_attempts: 3
    backoff_strategy: "exponential"

  # 断点续传
  checkpoint:
    enabled: true
    save_interval: 180  # 3分钟
    restore_on_restart: true

# 实验限制
constraints:
  max_duration_hours: 3.0
  max_tool_calls: 5000
  max_failures: 50

# 成功标准
success_criteria:
  operation_effectiveness:
    threshold: 0.90
    groups: ["E", "F"]

  efficiency_gain:
    threshold: 10.0
    groups: ["F"]

  mechanism_effectiveness:
    tool_anchoring:
      threshold: 0.70
      comparison: ["D", "E"]

    strategy_sharing:
      threshold: 0.50
      comparison: ["E", "F"]

  statistical_significance:
    threshold: 0.05
    comparisons:
      - ["D", "E"]
      - ["E", "F"]
      - ["D", "F"]

# 预期结果
expected_results:
  operation_effectiveness:
    D: 0.40
    E: 0.92
    F: 0.96

  efficiency_gain:
    D: 1.0
    E: 15.0
    F: 30.0

  tool_usage_ratio:
    D: 0.00
    E: 0.85
    F: 0.85

  strategy_transfer_rate:
    D: 0.00
    E: 0.00
    F: 0.60

  statistical_significance:
    D_vs_E: true
    E_vs_F: true
    D_vs_F: true

  mechanism_conclusion:
    tool_anchoring: "显著提升"
    feedback_loop: "正相关"
    strategy_sharing: "有效传递"
