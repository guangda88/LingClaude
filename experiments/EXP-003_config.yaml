# 配方定义
recipes:
  enhanced:
    rules:
      - name: "tool_anchoring"
        description: "优先使用工具，避免推测"
        enforcement: "strict"
      - name: "read_before_edit"
        description: "修改前必须先阅读文件"
        enforcement: "strict"
      - name: "test_after_edit"
        description: "修改后必须测试"
        enforcement: "strict"
      - name: "diagnose_before_retry"
        description: "重试前先诊断失败原因"
        enforcement: "strict"
      - name: "extract_strategies"
        description: "提取有效策略"
        enforcement: "recommended"
    max_attempts: 5
    diagnostic_level: "systematic"
    retry_strategy: "exponential_backoff"

