# EXP-3: Theoretical Boundaries
# 实验ID：EXP-003
# 实验目标：研究AI自我进化的理论边界条件

experiment:
  id: "EXP-003"
  name: "理论边界实验"
  version: "1.0"
  start_date: "2026-04-12"
  researcher: "LingClaude (灵克)"
  reviewer: "LingYang (灵妍)"
  research_question: "RQ3: AI自我进化的边界是什么？"

# 实验假设
hypotheses:
  H3a:
    statement: "存在最小工具集阈值（≥20工具）"
    target: "验证阈值"
    metric: "tool_count_threshold"

  H3b:
    statement: "存在最小时间阈值（≥2小时）"
    target: "验证阈值"
    metric: "time_threshold"

  H3c:
    statement: "存在效率提升上限（理论极限1000x）"
    target: "验证上限"
    metric: "efficiency_limit"

# 实验维度
dimensions:
  tool_count:
    name: "工具数量阈值"
    description: "AI自我进化所需的最小工具集规模"
    values:
      - 10   # 小规模工具集
      - 30   # 中等规模工具集
      - 50   # 大规模工具集
      - 100  # 超大规模工具集
    expected_threshold: 20
    measurement:
      metric: "efficiency_gain"
      target_threshold: 10.0  # 效率提升≥10x才算有效

  time_duration:
    name: "时间阈值"
    description: "AI自我进化所需的最小时间"
    values:
      - 1    # 1小时
      - 2    # 2小时
      - 5    # 5小时
      - 8    # 8小时
    expected_threshold: 2
    measurement:
      metric: "effectiveness_improvement_rate"
      target_threshold: 0.05  # 每小时提升≥5%

  task_complexity:
    name: "任务复杂度阈值"
    description: "AI自我进化有效的任务复杂度上限"
    values:
      - simple
      - medium
      - complex
    expected_threshold: medium
    measurement:
      metric: "operation_effectiveness"
      target_threshold: 0.90  # 有效性≥90%

# 实验组别设计
