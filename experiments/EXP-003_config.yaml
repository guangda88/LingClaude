# 测量指标
metrics:
  # 核心指标
  core:
    operation_effectiveness:
      formula: "successes / attempts"
      unit: "ratio"
      target: 0.90

    efficiency_gain:
      formula: "expected_human_time / actual_ai_time"
      unit: "x"
      target: 10.0

    cognitive_stability:
      formula: "1 - variance(repeated_operations)"
      unit: "ratio"
      target: 0.95

    tool_usage_ratio:
      formula: "tool_calls / total_operations"
      unit: "ratio"
      target: 0.80

    feedback_loop_strength:
      formula: "feedback_actions / total_actions"
      unit: "ratio"
      target: 0.70

  # 边界特定指标
  boundary:
    tool_count_effectiveness:
      description: "工具数量对有效性的影响"
      formula: "operation_effectiveness / sqrt(tool_count)"
      unit: "ratio"

    time_decay_rate:
      description: "效率随时间衰减的速率"
      formula: "(efficiency_1h - efficiency_end) / time_elapsed"
      unit: "x_per_hour"

    complexity_penalty:
      description: "任务复杂度对性能的惩罚"
      formula: "base_performance * (1 - complexity_factor)"
      unit: "ratio"

    efficiency_limit:
      description: "效率提升的上限"
      formula: "max(efficiency_gain)"
      unit: "x"
      target: 1000.0

# 监控配置
monitoring:
  enabled: true

  sampling:
    sample_interval: 300  # 5分钟（更长时间实验）
    check_points: [0.5, 1.0, 1.5, 2.0, 2.5, 3.0, 4.0, 5.0, 6.0, 7.0, 8.0]  # 小时

  realtime_metrics:
    - operation_effectiveness
    - efficiency_gain
    - tool_usage_ratio
    - feedback_loop_strength
    - success_rate
    - tool_count_effectiveness
    - time_decay_rate

  logging:
    level: "DEBUG"
    format: "jsonl"
    file: "experiments/data/EXP-003_{group_id}_run{run_id}.jsonl"

# 数据输出配置
output:
  data_dir: "experiments/data/EXP-003"
  report_dir: "experiments/reports/EXP-003"
  plot_dir: "experiments/plots/EXP-003"

  report_formats:
    - "markdown"
    - "json"

# 统计检验配置
statistics:
  enabled: true
  alpha: 0.05
  tests:
    - "t_test"
    - "anova"
  effect_size:
    - "cohens_d"

# 验证标准
validation:
  min_operations: 50

  data_quality:
    - "no_missing_values"
    - "consistent_timestamps"
    - "valid_metric_ranges"

  confidence_level: 0.95

# 风险缓解
risk_mitigation:
  timeout_handling:
    enabled: true
    grace_period: 300  # 5分钟
    checkpoint_interval: 600  # 10分钟

  retry:
    enabled: true
    max_attempts: 3
    backoff_strategy: "exponential"

  checkpoint:
    enabled: true
    save_interval: 600  # 10分钟
    restore_on_restart: true

# 实验限制
constraints:
  max_duration_hours: 8.0
  max_tool_calls: 10000
  max_failures: 100

# 成功标准
success_criteria:
  effectiveness_threshold:
    threshold: 0.90
    groups: ["TC30", "TC50", "TC100", "T2H", "T5H", "T8H", "CS", "CM"]

  efficiency_threshold:
    threshold: 10.0
    groups: ["TC30", "TC50", "TC100", "T2H", "T5H", "T8H", "CS", "CM"]

  threshold_detection:
    tool_count:
      expected_threshold: 20
      tolerance: 5  # ±5工具
    time:
      expected_threshold: 2.0
      tolerance: 0.5  # ±0.5小时
    complexity:
      expected_threshold: "medium"
      tolerance: 1  # 允许相邻级别

  statistical_significance:
    threshold: 0.05
    comparisons:
      - ["TC10", "TC30"]
      - ["TC30", "TC50"]
      - ["T1H", "T2H"]
      - ["T2H", "T5H"]
      - ["CS", "CM"]
      - ["CM", "CC"]

# 预期结果
expected_results:
  tool_count_threshold:
    threshold: 20
    reasoning: "工具数量<20时，效率提升<10x"

  time_threshold:
    threshold: 2.0
    reasoning: "时间<2小时时，进化效果不显著"

  efficiency_limit:
    limit: 1000.0
    reasoning: "效率提升上限约为1000倍"

  complexity_limit:
    limit: "medium"
    reasoning: "复杂任务下性能下降显著"
