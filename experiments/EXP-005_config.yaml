# EXP-5: Cross-Task Generalization
# 实验ID：EXP-005
# 实验目标：研究配方能否跨任务泛化

experiment:
  id: "EXP-005"
  name: "跨任务泛化实验"
  version: "1.0"
  start_date: "2026-04-12"
  researcher: "lingclaude (灵克)"
  reviewer: "lingyang (灵妍)"
  research_question: "RQ5: 配方能否跨任务泛化？"

# 实验假设
hypotheses:
  H5a:
    statement: "配方可跨任务泛化（≥80%性能保持）"
    target: "验证性能保持率"
    metric: "performance_retention_rate"

  H5b:
    statement: "任务相似度越高，泛化效果越好"
    target: "验证相似度相关性"
    metric: "similarity_correlation"

  H5c:
    statement: "适应迁移比直接转移更有效"
    target: "验证迁移策略"
    metric: "adaptive_vs_direct_improvement"

# 泛化维度
dimensions:
  transfer_strategy:
    name: "迁移策略"
    description: "直接转移 vs 适应迁移"
    values:
      - direct        # 直接转移（直接应用配方）
      - adaptive      # 适应迁移（根据任务调整配方）
      - hybrid        # 混合迁移（部分直接+部分适应）
    expected_best: "adaptive"

  task_similarity:
    name: "任务相似度"
    description: "源任务与目标任务的相似程度"
    values:
      - high          # 高相似度（同类型、同领域）
      - medium        # 中等相似度（同类型、不同领域）
      - low           # 低相似度（不同类型、不同领域）
    expected_best: "high"

  recipe_complexity:
    name: "配方复杂度"
    description: "配方的复杂程度"
    values:
      - simple        # 简单配方（3-5条规则）
      - medium        # 中等配方（6-10条规则）
      - complex       # 复杂配方（>10条规则）
    expected_best: "medium"

# 实验组别设计
groups:
  # 组别1: 高相似度-直接转移
  high_direct_simple:
    id: "HD-S"
    name: "高相似-直接-简单配方"
    dimension: "task_similarity"
    task_similarity: "high"
    transfer_strategy: "direct"
    recipe_complexity: "simple"
    source_task: "TASK-005-SOURCE-CODE"
    target_task: "TASK-005-TARGET-CODE"
    similarity_score: 0.85
    expected_retention: 0.95
    time_limit_hours: 2.0

  # 组别2: 高相似度-适应迁移-简单配方
  high_adaptive_simple:
    id: "HA-S"
    name: "高相似-适应-简单配方"
    dimension: "transfer_strategy"
    task_similarity: "high"
    transfer_strategy: "adaptive"
    recipe_complexity: "simple"
    source_task: "TASK-005-SOURCE-CODE"
    target_task: "TASK-005-TARGET-CODE"
    similarity_score: 0.85
    expected_retention: 0.97
    time_limit_hours: 2.0

  # 组别3: 高相似度-适应迁移-中等配方
  high_adaptive_medium:
    id: "HA-M"
    name: "高相似-适应-中等配方"
    dimension: "recipe_complexity"
    task_similarity: "high"
    transfer_strategy: "adaptive"
    recipe_complexity: "medium"
    source_task: "TASK-005-SOURCE-CODE"
    target_task: "TASK-005-TARGET-CODE"
    similarity_score: 0.85
    expected_retention: 0.96
    time_limit_hours: 2.0

  # 组别4: 高相似度-适应迁移-复杂配方
  high_adaptive_complex:
    id: "HA-C"
    name: "高相似-适应-复杂配方"
    dimension: "recipe_complexity"
    task_similarity: "high"
    transfer_strategy: "adaptive"
    recipe_complexity: "complex"
    source_task: "TASK-005-SOURCE-CODE"
    target_task: "TASK-005-TARGET-CODE"
    similarity_score: 0.85
    expected_retention: 0.94
    time_limit_hours: 2.0

  # 组别5: 中等相似度-直接转移-中等配方
  medium_direct_medium:
    id: "MD-M"
    name: "中相似-直接-中等配方"
    dimension: "task_similarity"
    task_similarity: "medium"
    transfer_strategy: "direct"
    recipe_complexity: "medium"
    source_task: "TASK-005-SOURCE-CODE"
    target_task: "TASK-005-TARGET-DOCS"
    similarity_score: 0.60
    expected_retention: 0.85
    time_limit_hours: 2.0

  # 组别6: 中等相似度-适应迁移-中等配方
  medium_adaptive_medium:
    id: "MA-M"
    name: "中相似-适应-中等配方"
    dimension: "transfer_strategy"
    task_similarity: "medium"
    transfer_strategy: "adaptive"
    recipe_complexity: "medium"
    source_task: "TASK-005-SOURCE-CODE"
    target_task: "TASK-005-TARGET-DOCS"
    similarity_score: 0.60
    expected_retention: 0.91
    time_limit_hours: 2.0

  # 组别7: 中等相似度-混合迁移-中等配方
  medium_hybrid_medium:
    id: "MH-M"
    name: "中相似-混合-中等配方"
    dimension: "transfer_strategy"
    task_similarity: "medium"
    transfer_strategy: "hybrid"
    recipe_complexity: "medium"
    source_task: "TASK-005-SOURCE-CODE"
    target_task: "TASK-005-TARGET-DOCS"
    similarity_score: 0.60
    hybrid_ratio: 0.5  # 50%直接，50%适应
    expected_retention: 0.89
    time_limit_hours: 2.0

  # 组别8: 低相似度-直接转移-中等配方
  low_direct_medium:
    id: "LD-M"
    name: "低相似-直接-中等配方"
    dimension: "task_similarity"
    task_similarity: "low"
    transfer_strategy: "direct"
    recipe_complexity: "medium"
    source_task: "TASK-005-SOURCE-CODE"
    target_task: "TASK-005-TARGET-TEST"
    similarity_score: 0.35
    expected_retention: 0.70
    time_limit_hours: 2.0

  # 组别9: 低相似度-适应迁移-中等配方
  low_adaptive_medium:
    id: "LA-M"
    name: "低相似-适应-中等配方"
    dimension: "task_similarity"
    task_similarity: "low"
    transfer_strategy: "adaptive"
    recipe_complexity: "medium"
    source_task: "TASK-005-SOURCE-CODE"
    target_task: "TASK-005-TARGET-TEST"
    similarity_score: 0.35
    expected_retention: 0.82
    time_limit_hours: 2.0

