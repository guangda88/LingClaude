# 迁移策略配置
transfer_strategies:
  direct:
    name: "直接转移"
    description: "直接应用配方到新任务"
    adaptation:
      enabled: false
      rule_modifications: []
    performance_retention_factor: 0.85  # 预期85%性能保持

  adaptive:
    name: "适应迁移"
    description: "根据任务特点调整配方"
    adaptation:
      enabled: true
      adaptation_methods:
        - name: "rule_pruning"
          description: "移除不相关的规则"
          trigger: "domain_mismatch"
        - name: "rule_refinement"
          description: "细化规则以适应新任务"
          trigger: "task_type_change"
        - name: "rule_addition"
          description: "添加新任务需要的规则"
          trigger: "missing_capabilities"
        - name: "parameter_tuning"
          description: "调整规则参数"
          trigger: "performance_feedback"
    performance_retention_factor: 0.95  # 预期95%性能保持
    adaptation_overhead: 0.2  # 20%时间开销

  hybrid:
    name: "混合迁移"
    description: "部分规则直接转移，部分适应调整"
    adaptation:
      enabled: true
      hybrid_ratio: 0.5  # 50%直接，50%适应
      adaptation_methods:
        - name: "selective_adaptation"
          description: "选择性适应关键规则"
          selection_criteria: "task_relevance"
    performance_retention_factor: 0.90  # 预期90%性能保持
    adaptation_overhead: 0.1  # 10%时间开销

# 任务相似度计算
similarity_metrics:
  domain_similarity:
    weight: 0.3
    description: "领域相似度（软件开发 vs 质量保证）"

  type_similarity:
    weight: 0.4
    description: "类型相似度（代码质量 vs 文档编写）"

  tool_overlap:
    weight: 0.2
    description: "工具重叠度（使用的工具集合相似性）"

  process_similarity:
    weight: 0.1
    description: "流程相似度（工作流程相似性）"

# 测量指标
metrics:
  # 核心指标
  core:
    operation_effectiveness:
      formula: "successes / attempts"
      unit: "ratio"
      target: 0.90

    efficiency_gain:
      formula: "expected_human_time / actual_ai_time"
      unit: "x"
      target: 20.0

  # 泛化特定指标
  generalization:
    performance_retention_rate:
      description: "性能保持率（相对于源任务）"
      formula: "effectiveness_target / effectiveness_source"
      unit: "ratio"
      target: 0.80

    similarity_correlation:
      description: "任务相似度与泛化效果的相关性"
      formula: "correlation(similarity_scores, retention_rates)"
      unit: "pearson_r"
      target: 0.70

    adaptive_vs_direct_improvement:
      description: "适应迁移相对于直接转移的改进"
      formula: "retention_adaptive - retention_direct"
      unit: "ratio"
      target: 0.10

    transfer_speed:
      description: "迁移速度（配方应用时间）"
      formula: "recipe_application_time / total_time"
      unit: "ratio"
      target: 0.30  # <30%时间用于迁移

    adaptation_overhead:
      description: "适应调整的开销"
      formula: "adaptation_time / total_time"
      unit: "ratio"
      target: 0.20  # <20%时间用于适应

    rule_effectiveness_rate:
      description: "规则有效性比率（有多少规则在目标任务中有效）"
      formula: "effective_rules / total_rules"
      unit: "ratio"
      target: 0.75

    cross_domain_transfer_success:
      description: "跨域转移成功率"
      formula: "success_rate_across_domains"
      unit: "ratio"
      target: 0.70

    recipe_stability:
      description: "配方稳定性（不同任务下的一致性）"
      formula: "1 - std_dev(effectiveness_across_tasks)"
      unit: "ratio"
      target: 0.80

    transfer_distance:
      description: "迁移距离（源任务到目标任务的距离）"
      formula: "sqrt(sum((similarity_metrics - source_metrics)^2))"
      unit: "distance"
      target: 0.50

    generalization_gap:
      description: "泛化差距（原任务性能 vs 迁移后性能的差距）"
      formula: "effectiveness_source - effectiveness_target"
      unit: "ratio"
      target: 0.15  # <15%差距

# 监控配置
monitoring:
  enabled: true

  sampling:
    sample_interval: 180  # 3分钟
    check_points: [0.5, 1.0, 1.5, 2.0]  # 小时

  realtime_metrics:
    - operation_effectiveness
    - efficiency_gain
    - performance_retention_rate
    - transfer_speed
    - rule_effectiveness_rate
    - adaptation_overhead

  logging:
    level: "DEBUG"
    format: "jsonl"
    file: "experiments/data/EXP-005_{group_id}_run{run_id}.jsonl"

# 数据输出配置
output:
  data_dir: "experiments/data/EXP-005"
  report_dir: "experiments/reports/EXP-005"
  plot_dir: "experiments/plots/EXP-005"

  report_formats:
    - "markdown"
    - "json"

  # 泛化特定输出
  generalization_outputs:
    transfer_log: "transfer_log.jsonl"
    adaptation_log: "adaptation_log.jsonl"
    recipe_comparison: "recipe_comparison.json"
    similarity_matrix: "similarity_matrix.json"

# 统计检验配置
statistics:
  enabled: true
  alpha: 0.05
  tests:
    - "t_test"
    - "anova"
    - "correlation"
  effect_size:
    - "cohens_d"
    - "eta_squared"

  # 泛化特定检验
  generalization_tests:
    - "retention_rate_test"      # 测试性能保持率
    - "similarity_correlation_test"  # 测试相似度相关性
    - "adaptive_vs_direct_test"  # 测试适应迁移 vs 直接转移
    - "complexity_impact_test"   # 测试配方复杂度影响

# 验证标准
validation:
  min_operations: 30

  data_quality:
    - "no_missing_values"
    - "consistent_timestamps"
    - "valid_metric_ranges"
    - "valid_source_target_pairs"
    - "consistent_recipe_application"

  confidence_level: 0.95

  # 泛化特定验证
  generalization_validation:
    min_source_performance: 0.85  # 源任务性能≥85%
    min_transfer_success: 0.70  # 迁移成功率≥70%
    max_performance_gap: 0.20  # 性能差距<20%

# 风险缓解
risk_mitigation:
  timeout_handling:
    enabled: true
    grace_period: 300  # 5分钟
    checkpoint_interval: 300  # 5分钟

  retry:
    enabled: true
    max_attempts: 3
    backoff_strategy: "exponential"

  checkpoint:
    enabled: true
    save_interval: 300  # 5分钟
    restore_on_restart: true

  # 泛化特定风险缓解
  generalization_risks:
    negative_transfer_prevention:
      enabled: true
      performance_drop_threshold: 0.30  # 性能下降>30%时停止

    recipe_mismatch_handling:
      enabled: true
      mismatch_threshold: 0.50  # 规则不匹配>50%时警告

    fallback_strategy:
      enabled: true
      fallback_to_baseline: true  # 回退到基线配方

# 实验限制
constraints:
  max_duration_hours: 2.0
  max_recipe_rules: 12  # 最多12条规则
  max_adaptation_time: 0.5  # 最多0.5小时用于适应

# 成功标准
success_criteria:
  performance_retention:
    threshold: 0.80  # 80%性能保持
    groups: ["HD-S", "HA-S", "HA-M", "HA-C", "MA-M", "MH-M", "LA-M"]

  efficiency_gain:
    threshold: 15.0
    groups: ["HD-S", "HA-S", "HA-M", "HA-C", "MA-M", "MH-M", "LA-M"]

  similarity_correlation:
    threshold: 0.60  # 相关系数≥0.60
    comparison: "task_similarity vs performance_retention"

  adaptive_improvement:
    threshold: 0.05  # 适应迁移比直接转移好5%
    comparisons:
      - ["HD-S", "HA-S"]  # 高相似
      - ["MD-M", "MA-M"]  # 中相似
      - ["LD-M", "LA-M"]  # 低相似

  statistical_significance:
    threshold: 0.05
    comparisons:
      - ["HD-S", "HA-S"]
      - ["MD-M", "MA-M"]
      - ["LD-M", "LA-M"]
      - ["MD-M", "MH-M"]
      - ["HA-M", "MA-M"]
      - ["MA-M", "LA-M"]

# 预期结果
expected_results:
  transfer_strategies:
    best_strategy: "adaptive"  # 适应迁移最优
    reasoning: "适应迁移能根据任务特点调整配方，提高泛化效果"

  task_similarity:
    high_similarity_retention: 0.95  # 高相似度95%保持
    medium_similarity_retention: 0.88  # 中相似度88%保持
    low_similarity_retention: 0.78  # 低相似度78%保持
