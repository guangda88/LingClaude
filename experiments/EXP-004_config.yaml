# EXP-4: Multi-AI Collaborative Evolution
# 实验ID：EXP-004
# 实验目标：研究多AI协作是否能加速进化

experiment:
  id: "EXP-004"
  name: "多AI协作进化实验"
  version: "1.0"
  start_date: "2026-04-12"
  researcher: "lingclaude (灵克)"
  reviewer: "lingyang (灵妍)"
  research_question: "RQ4: 多AI协作是否能加速进化？"

# 实验假设
hypotheses:
  H4a:
    statement: "策略传递能提升进化速度2-3倍"
    target: "验证速度提升"
    metric: "evolution_speed_multiplier"

  H4b:
    statement: "群体进化能发现个体无法发现的策略"
    target: "验证策略发现"
    metric: "unique_strategy_count"

  H4c:
    statement: "协同进化能提升最终效率1.5-2倍"
    target: "验证效率提升"
    metric: "final_efficiency_multiplier"

# 协作维度
dimensions:
  collaboration_mode:
    name: "协作模式"
    description: "单AI vs 多AI协作的进化模式"
    values:
      - single        # 单AI独立进化
      - parallel      # 并行协作
      - sequential    # 串行协作
      - hybrid        # 混合协作
    expected_best: "parallel"

  communication_type:
    name: "通信类型"
    description: "实时 vs 非实时协作"
    values:
      - realtime      # 实时通信（立即共享策略）
      - periodic      # 周期通信（定期批量共享）
      - asynchronous  # 异步通信（按需共享）
    expected_best: "realtime"

  agent_specialization:
    name: "智能体专业化"
    description: "专业化分工 vs 通用协作"
    values:
      - specialized   # 专业化分工（不同智能体擅长不同任务）
      - generalized   # 通用协作（所有智能体能力相同）
    expected_best: "specialized"

  strategy_sharing_mechanism:
    name: "策略共享机制"
    description: "策略共享和冲突解决机制"
    values:
      - direct        # 直接共享（无过滤）
      - filtered      # 过滤共享（基于成功率过滤）
      - adaptive      # 自适应共享（动态调整）
    expected_best: "adaptive"

# 实验组别设计
groups:
  # 组别1: 单AI对照组
  single_ai_baseline:
    id: "SA"
    name: "单AI基线组"
    dimension: "collaboration_mode"
    collaboration_mode: "single"
    agent_count: 1
    communication_type: "none"
    agent_specialization: "generalized"
    strategy_sharing_mechanism: "none"
    recipe_level: "enhanced"
    tool_anchoring_enabled: true
    feedback_enabled: true
    task_complexity: "medium"
    time_limit_hours: 3.0
    expected_effectiveness: 0.90
    expected_efficiency: 25.0

  # 组别2: 并行协作-实时-专业化
  parallel_realtime_specialized:
    id: "P-RS"
    name: "并行-实时-专业化组"
    dimension: "collaboration_mode"
    collaboration_mode: "parallel"
    agent_count: 3
    communication_type: "realtime"
    agent_specialization: "specialized"
    strategy_sharing_mechanism: "adaptive"
    recipe_level: "enhanced"
    tool_anchoring_enabled: true
    feedback_enabled: true
    task_complexity: "medium"
    time_limit_hours: 3.0
    expected_effectiveness: 0.96
    expected_efficiency: 50.0

  # 组别3: 并行协作-周期-专业化
  parallel_periodic_specialized:
    id: "P-PS"
    name: "并行-周期-专业化组"
    dimension: "communication_type"
    collaboration_mode: "parallel"
    agent_count: 3
    communication_type: "periodic"
    agent_period_minutes: 30  # 每30分钟共享一次
    agent_specialization: "specialized"
    strategy_sharing_mechanism: "adaptive"
    recipe_level: "enhanced"
    tool_anchoring_enabled: true
    feedback_enabled: true
    task_complexity: "medium"
    time_limit_hours: 3.0
    expected_effectiveness: 0.94
    expected_efficiency: 40.0

  # 组别4: 串行协作-实时-专业化
  sequential_realtime_specialized:
    id: "S-RS"
    name: "串行-实时-专业化组"
    dimension: "collaboration_mode"
    collaboration_mode: "sequential"
    agent_count: 3
    communication_type: "realtime"
    agent_specialization: "specialized"
    strategy_sharing_mechanism: "adaptive"
    recipe_level: "enhanced"
    tool_anchoring_enabled: true
    feedback_enabled: true
    task_complexity: "medium"
    time_limit_hours: 3.0
    expected_effectiveness: 0.93
    expected_efficiency: 38.0

  # 组别5: 并行协作-实时-通用
  parallel_realtime_generalized:
    id: "P-RG"
    name: "并行-实时-通用组"
    dimension: "agent_specialization"
    collaboration_mode: "parallel"
    agent_count: 3
    communication_type: "realtime"
    agent_specialization: "generalized"
    strategy_sharing_mechanism: "adaptive"
    recipe_level: "enhanced"
    tool_anchoring_enabled: true
    feedback_enabled: true
    task_complexity: "medium"
    time_limit_hours: 3.0
    expected_effectiveness: 0.92
    expected_efficiency: 35.0

  # 组别6: 并行协作-实时-专业化-过滤共享
  parallel_realtime_filtered:
    id: "P-RF"
    name: "并行-实时-专业化-过滤组"
    dimension: "strategy_sharing_mechanism"
    collaboration_mode: "parallel"
    agent_count: 3
    communication_type: "realtime"
    agent_specialization: "specialized"
    strategy_sharing_mechanism: "filtered"
    strategy_filter_threshold: 0.85  # 成功率≥85%才共享
    recipe_level: "enhanced"
    tool_anchoring_enabled: true
    feedback_enabled: true
    task_complexity: "medium"
    time_limit_hours: 3.0
    expected_effectiveness: 0.95
    expected_efficiency: 45.0

  # 组别7: 混合协作-实时-专业化
  hybrid_realtime_specialized:
    id: "H-RS"
    name: "混合-实时-专业化组"
    dimension: "collaboration_mode"
    collaboration_mode: "hybrid"
    agent_count: 4
    collaboration_structure:  # 2个并行 + 1个串行审核
      parallel_agents: 2
      sequential_agents: 1
      review_agent: 1
    communication_type: "realtime"
    agent_specialization: "specialized"
    strategy_sharing_mechanism: "adaptive"
    recipe_level: "enhanced"
    tool_anchoring_enabled: true
    feedback_enabled: true
    task_complexity: "medium"
    time_limit_hours: 3.0
    expected_effectiveness: 0.97
    expected_efficiency: 55.0

  # 组别8: 并行协作-异步-专业化
  parallel_async_specialized:
    id: "P-AS"
    name: "并行-异步-专业化组"
    dimension: "communication_type"
    collaboration_mode: "parallel"
    agent_count: 3
    communication_type: "asynchronous"
    agent_specialization: "specialized"
    strategy_sharing_mechanism: "adaptive"
    recipe_level: "enhanced"
    tool_anchoring_enabled: true
    feedback_enabled: true
    task_complexity: "medium"
    time_limit_hours: 3.0
    expected_effectiveness: 0.91
    expected_efficiency: 32.0

# 智能体专业化配置
agent_specializations:
  CODING_AGENT:
    name: "编码智能体"
    specialization: "代码编写和修改"
    capabilities:
      - view
      - edit
      - test
      - format
      - lint
    priority_tasks:
      - "实现新功能"
      - "修复代码问题"
      - "优化代码结构"

  ANALYSIS_AGENT:
    name: "分析智能体"
    specialization: "代码分析和诊断"
    capabilities:
      - view
      - search
      - grep
      - analyze
      - diagnose
    priority_tasks:
      - "分析代码库"
      - "诊断问题"
      - "提取模式"

  TESTING_AGENT:
    name: "测试智能体"
    specialization: "测试和质量保证"
    capabilities:
      - test
      - coverage
      - benchmark
      - diagnose
    priority_tasks:
      - "编写测试"
      - "运行测试"
      - "验证修复"

  OPTIMIZATION_AGENT:
    name: "优化智能体"
    specialization: "性能优化和重构"
    capabilities:
      - profile
      - refactor
      - optimize
      - analyze
    priority_tasks:
      - "性能优化"
      - "代码重构"
      - "架构改进"

  REVIEW_AGENT:
    name: "审核智能体"
    specialization: "代码审核和策略评估"
    capabilities:
      - view
      - analyze
      - diagnose
      - lint
    priority_tasks:
      - "代码审核"
      - "策略评估"
      - "冲突解决"

# 策略共享机制配置
strategy_sharing:
  direct:
    sharing_trigger: "immediate"  # 立即共享
    sharing_filter: "none"  # 无过滤
    conflict_resolution: "first_come_first_served"  # 先到先得
    strategy_versioning: false  # 无版本控制

  filtered:
    sharing_trigger: "immediate"
    sharing_filter:
      min_success_rate: 0.85  # 成功率≥85%
      min_usage_count: 3      # 使用次数≥3
      min_efficiency_gain: 1.5x  # 效率提升≥1.5x
    conflict_resolution: "merge_success_rates"  # 合并成功率
    strategy_versioning: true

  adaptive:
    sharing_trigger: "dynamic"  # 动态触发
    sharing_filter:
      initial_threshold:
        min_success_rate: 0.70
        min_usage_count: 1
      adaptive_adjustment:
        strategy: "top_k"  # 保留top-k策略
        k_percentage: 0.3  # 保留前30%
        update_interval_hours: 0.5  # 每30分钟更新一次
    conflict_resolution: "voting"  # 投票决定
    strategy_versioning: true
    strategy_merging:
      enabled: true
      merge_similarity_threshold: 0.85  # 相似度≥85%时合并

# 协作机制配置
collaboration_mechanisms:
  parallel:
    execution_mode: "parallel"  # 并行执行
    task_distribution: "load_balanced"  # 负载均衡
    coordination: "minimal"  # 最小协调

  sequential:
    execution_mode: "sequential"  # 串行执行
    task_distribution: "pipeline"  # 流水线
    coordination: "tight"  # 紧密协调

  hybrid:
    execution_mode: "mixed"  # 混合模式
    task_distribution:
      parallel_tasks: 0.6  # 60%任务并行
      sequential_tasks: 0.3  # 30%任务串行
      review_tasks: 0.1  # 10%任务审核
    coordination: "adaptive"  # 自适应协调

# 配方定义
recipes:
  enhanced:
    rules:
      - name: "tool_anchoring"
        description: "优先使用工具，避免推测"
        enforcement: "strict"
      - name: "read_before_edit"
        description: "修改前必须先阅读文件"
        enforcement: "strict"
      - name: "test_after_edit"
        description: "修改后必须测试"
        enforcement: "strict"
      - name: "diagnose_before_retry"
        description: "重试前先诊断失败原因"
        enforcement: "strict"
      - name: "extract_strategies"
        description: "提取有效策略"
        enforcement: "recommended"
      - name: "share_strategies"
        description: "共享成功策略（多AI模式）"
        enforcement: "recommended"
      - name: "resolve_conflicts"
        description: "解决策略冲突（多AI模式）"
        enforcement: "recommended"
    max_attempts: 5
    diagnostic_level: "systematic"
    retry_strategy: "exponential_backoff"

# 任务配置
task:
  id: "TASK-004"
  name: "协作进化任务"
  description: "测试多AI协作进化的效果"
  difficulty: "medium"

  # 子任务（中等复杂度）
  subtasks:
    - id: "ST-001"
      name: "代码库诊断"
      description: "分析代码库，识别潜在问题"
      expected_time_hours: 1.0
      dependencies: []
      required_agent: "ANALYSIS_AGENT"

    - id: "ST-002"
      name: "实现功能1"
      description: "实现第一个功能模块"
      expected_time_hours: 0.5
      dependencies: ["ST-001"]
      required_agent: "CODING_AGENT"

    - id: "ST-003"
      name: "实现功能2"
      description: "实现第二个功能模块"
      expected_time_hours: 0.5
      dependencies: ["ST-001"]
      required_agent: "CODING_AGENT"

    - id: "ST-004"
      name: "编写测试"
      description: "为新功能编写测试"
      expected_time_hours: 0.5
      dependencies: ["ST-002", "ST-003"]
      required_agent: "TESTING_AGENT"

    - id: "ST-005"
      name: "性能优化"
      description: "优化系统性能"
      expected_time_hours: 0.5
      dependencies: ["ST-004"]
      required_agent: "OPTIMIZATION_AGENT"

  # 人类预期时间
  expected_human_time_months: 4.0
  expected_human_time_hours: 640.0  # 4个月 * 20天 * 8小时

  # 工具集定义（50工具，与EXP-3一致）
  toolset:
    - view
    - edit
    - test
    - diagnose
    - analyze
    - search
    - replace
    - format
    - lint
    - build
    - debug
    - profile
    - benchmark
    - coverage
    - docs
    - git
    - refactor
    - optimize
    - security
    - dependency
    - deploy
    - monitor
    - log
    - trace
    - metrics
    - alert
    - backup
    - restore
    - migrate
    - cache
    - queue
    - database
    - api
    - cli
    - web
    - mobile
    - desktop
    - cloud
    - ai
    - ml
    - nlp
    - cv
    - graphql
    - grpc
    - websocket
    - rest
    - mqtt
    - kafka
    - redis
    - postgresql
    - mysql
    - mongodb

# 测量指标
metrics:
  # 核心指标
  core:
    operation_effectiveness:
      formula: "successes / attempts"
      unit: "ratio"
      target: 0.90

    efficiency_gain:
      formula: "expected_human_time / actual_ai_time"
      unit: "x"
      target: 25.0

    cognitive_stability:
      formula: "1 - variance(repeated_operations)"
      unit: "ratio"
      target: 0.95

    tool_usage_ratio:
      formula: "tool_calls / total_operations"
      unit: "ratio"
      target: 0.80

    feedback_loop_strength:
      formula: "feedback_actions / total_actions"
      unit: "ratio"
      target: 0.70

  # 协作特定指标
  collaboration:
    evolution_speed_multiplier:
      description: "协作进化的速度提升倍数"
      formula: "time_to_convergence_single_ai / time_to_convergence_collaborative"
      unit: "x"
      target: 2.5

    unique_strategy_count:
      description: "群体发现的独特策略数量"
      formula: "count(unique_strategies_across_all_agents)"
      unit: "count"
      target: 10

    strategy_sharing_rate:
      description: "策略共享率"
      formula: "strategies_shared / strategies_discovered"
      unit: "ratio"
      target: 0.60

    final_efficiency_multiplier:
      description: "协同进化的最终效率提升倍数"
      formula: "efficiency_collaborative / efficiency_single_ai"
      unit: "x"
      target: 1.8

    agent_coordination_overhead:
      description: "智能体协调开销"
      formula: "coordination_time / total_time"
      unit: "ratio"
      target: 0.15  # <15%

    conflict_resolution_rate:
      description: "冲突解决成功率"
      formula: "resolved_conflicts / total_conflicts"
      unit: "ratio"
      target: 0.90

    knowledge_coverage:
      description: "知识覆盖率（所有智能体掌握的知识覆盖率）"
      formula: "union_of_agent_knowledge / total_possible_knowledge"
      unit: "ratio"
      target: 0.85

    strategy_diversity:
      description: "策略多样性"
      formula: "entropy(strategy_distribution) / log(max_possible_strategies)"
      unit: "ratio"
      target: 0.70

    emergence_rate:
      description: "新兴策略出现率（群体中个体未发现的策略）"
      formula: "emergent_strategies / total_strategies"
      unit: "ratio"
      target: 0.20

    load_balance_index:
      description: "负载均衡指数（0=完全不均衡, 1=完全均衡）"
      formula: "1 - std_dev(agent_workloads) / mean(agent_workloads)"
      unit: "ratio"
      target: 0.80

# 监控配置
monitoring:
  enabled: true

  sampling:
    sample_interval: 180  # 3分钟
    check_points: [0.5, 1.0, 1.5, 2.0, 2.5, 3.0]  # 小时

  realtime_metrics:
    - operation_effectiveness
    - efficiency_gain
    - tool_usage_ratio
    - feedback_loop_strength
    - strategy_sharing_rate
    - agent_coordination_overhead
    - load_balance_index
    - unique_strategy_count

  logging:
    level: "DEBUG"
    format: "jsonl"
    file: "experiments/data/EXP-004_{group_id}_run{run_id}.jsonl"

# 数据输出配置
output:
  data_dir: "experiments/data/EXP-004"
  report_dir: "experiments/reports/EXP-004"
  plot_dir: "experiments/plots/EXP-004"

  report_formats:
    - "markdown"
    - "json"

  # 协作特定输出
  collaboration_outputs:
    strategy_sharing_log: "strategy_sharing.jsonl"
    conflict_resolution_log: "conflict_resolution.jsonl"
    agent_communication_graph: "communication_graph.json"
    knowledge_base_snapshot: "knowledge_base.json"

# 统计检验配置
statistics:
  enabled: true
  alpha: 0.05
  tests:
    - "t_test"
    - "anova"
    - "mann_whitney_u"
  effect_size:
    - "cohens_d"
    - "cliffs_delta"

  # 协作特定检验
  collaboration_tests:
    - "evolution_speed_comparison"  # SA vs 其他组
    - "strategy_diversity_test"      # 专业化 vs 通用
    - "coordination_overhead_test"  # 实时 vs 非实时
    - "efficiency_multiplier_test"  # 不同协作模式

# 验证标准
validation:
  min_operations: 50

  data_quality:
    - "no_missing_values"
    - "consistent_timestamps"
    - "valid_metric_ranges"
    - "consistent_agent_ids"
    - "valid_strategy_records"

  confidence_level: 0.95

  # 协作特定验证
  collaboration_validation:
    min_strategy_shares: 5
    min_agent_participation: 0.8  # 80%智能体参与
    max_conflict_rate: 0.15  # 冲突率<15%

# 风险缓解
risk_mitigation:
  timeout_handling:
    enabled: true
    grace_period: 300  # 5分钟
    checkpoint_interval: 300  # 5分钟

  retry:
    enabled: true
    max_attempts: 3
    backoff_strategy: "exponential"

  checkpoint:
    enabled: true
    save_interval: 300  # 5分钟
    restore_on_restart: true

  # 协作特定风险缓解
  collaboration_risks:
    deadlock_prevention:
      enabled: true
      timeout_seconds: 60  # 60秒无响应视为死锁

    strategy_conflict_handling:
      enabled: true
      max_conflict_retries: 3
      fallback_strategy: "vote"

    agent_failure_handling:
      enabled: true
      max_agent_failures: 1  # 允许1个智能体失败
      redistribution_strategy: "load_balance"

# 实验限制
constraints:
  max_duration_hours: 3.0
  max_tool_calls: 10000
  max_failures: 100
  max_agents: 4  # 最多4个智能体

# 成功标准
success_criteria:
  effectiveness_threshold:
    threshold: 0.92
    groups: ["P-RS", "P-PS", "S-RS", "P-RG", "P-RF", "H-RS", "P-AS"]

  efficiency_threshold:
    threshold: 30.0
    groups: ["P-RS", "P-PS", "S-RS", "P-RG", "P-RF", "H-RS", "P-AS"]

  evolution_speed:
    threshold: 2.0  # 2倍速度提升
    baseline: "SA"  # 相比单AI基线
    target_groups: ["P-RS", "H-RS"]

  final_efficiency:
    threshold: 1.5  # 1.5倍效率提升
    baseline: "SA"  # 相比单AI基线
    target_groups: ["P-RS", "P-RF", "H-RS"]

  strategy_discovery:
    threshold: 5  # 至少5个独特策略
    target_groups: ["P-RS", "H-RS"]

  statistical_significance:
    threshold: 0.05
    comparisons:
      - ["SA", "P-RS"]
      - ["SA", "H-RS"]
      - ["P-RS", "P-PS"]
      - ["P-RS", "S-RS"]
      - ["P-RS", "P-RG"]
      - ["P-RS", "P-RF"]
      - ["P-RS", "P-AS"]

# 预期结果
expected_results:
  collaboration_modes:
    best_mode: "parallel"  # 并行协作最优
    reasoning: "并行协作能最大化任务并行度，减少总时间"

  communication_types:
    best_type: "realtime"  # 实时通信最优
    reasoning: "实时通信能最快共享策略，减少重复探索"

  agent_specializations:
    best_approach: "specialized"  # 专业化最优
    reasoning: "专业化分工能充分利用每个智能体的优势"

  strategy_sharing_mechanisms:
    best_mechanism: "adaptive"  # 自适应共享最优
    reasoning: "自适应共享能平衡策略质量和多样性"

  overall_best_group: "H-RS"  # 混合-实时-专业化
  reasoning: "结合并行执行和串行审核，能平衡速度和质量"

# 实验设计摘要
design_summary:
  group_count: 8  # 8个实验组
